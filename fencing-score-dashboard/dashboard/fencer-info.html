<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fencer Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 800px;
        }

        .fencer-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex: 1;
        }

        .fencer-panel h3 {
            margin: 0 0 20px 0;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            color: white;
            font-weight: bold;
        }

        .left-panel h3 {
            background: linear-gradient(135deg, #ff0000 0%, #dd3f76 100%);
        }

        .right-panel h3 {
            background: linear-gradient(135deg, #4CAF50 0%, #048f04 100%);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: darkorchid;
        }

        .actions {
            margin-top: 20px;
            text-align: center;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 5px;
            transition: background-color 0.2s;
        }

        button:hover {
            background: #45a049;
        }

        .clear-btn {
            background: #f44336;
        }

        .clear-btn:hover {
            background: #da190b;
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            display: none;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Fencer -->
        <div class="fencer-panel left-panel">
            <h3>Fencer on the Left</h3>
            <div class="form-group">
                <label for="left-name">Name:</label>
                <input type="text" id="left-name" placeholder="Enter fencer's name">
            </div>
            <div class="form-group">
                <label for="left-pronouns">Pronouns:</label>
                <input type="text" id="left-pronouns" placeholder="e.g., they/them, she/her, he/him">
            </div>
            <div class="form-group">
                <label for="left-club">Club:</label>
                <input type="text" id="left-club" placeholder="Enter club name">
            </div>
        </div>

        <!-- Right Fencer -->
        <div class="fencer-panel right-panel">
            <h3>Fencer on the Right</h3>
            <div class="form-group">
                <label for="right-name">Name:</label>
                <input type="text" id="right-name" placeholder="Enter fencer's name">
            </div>
            <div class="form-group">
                <label for="right-pronouns">Pronouns:</label>
                <input type="text" id="right-pronouns" placeholder="e.g., they/them, she/her, he/him">
            </div>
            <div class="form-group">
                <label for="right-club">Club:</label>
                <input type="text" id="right-club" placeholder="Enter club name">
            </div>
        </div>
    </div>

    <div class="actions">
        <button id="clear-btn" type="submit" class="clear-btn">Clear All</button>
        <button id="update-btn" type="submit">Update Fencer Info</button>
    </div>

    <div id="status" class="status"></div>

    <script>
        const fencersReplicant = nodecg.Replicant('fencers');

        // Input elements
        const leftName = document.getElementById('left-name');
        const leftPronouns = document.getElementById('left-pronouns');
        const leftClub = document.getElementById('left-club');
        const rightName = document.getElementById('right-name');
        const rightPronouns = document.getElementById('right-pronouns');
        const rightClub = document.getElementById('right-club');

        // Buttons
        const updateBtn = document.getElementById('update-btn');
        const clearBtn = document.getElementById('clear-btn');
        const status = document.getElementById('status');

        // Load existing data when replicant changes
        fencersReplicant.on('change', (newValue) => {
            if (newValue) {
                leftName.value = newValue.left?.name || '';
                leftPronouns.value = newValue.left?.pronouns || '';
                leftClub.value = newValue.left?.club || '';
                rightName.value = newValue.right?.name || '';
                rightPronouns.value = newValue.right?.pronouns || '';
                rightClub.value = newValue.right?.club || '';
            }
        });

        // Show status message
        function showStatus(message, isError = false) {
            status.textContent = message;
            status.className = `status ${isError ? 'error' : 'success'}`;
            status.style.display = 'block';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        // Update fencer information
        updateBtn.addEventListener('click', () => {
            try {
                const fencerData = {
                    left: {
                        name: leftName.value.trim(),
                        pronouns: leftPronouns.value.trim(),
                        club: leftClub.value.trim()
                    },
                    right: {
                        name: rightName.value.trim(),
                        pronouns: rightPronouns.value.trim(),
                        club: rightClub.value.trim()
                    }
                };

                fencersReplicant.value = fencerData;
                showStatus('Fencer information updated successfully!');
            } catch (error) {
                console.error('Error updating fencer data:', error);
                showStatus('Error updating fencer information', true);
            }
        });

        // Clear all fields
        clearBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear all fencer information?')) {
                try {
                    const emptyData = {
                        left: {
                            name: '',
                            pronouns: '',
                            club: ''
                        },
                        right: {
                            name: '',
                            pronouns: '',
                            club: ''
                        }
                    };

                    fencersReplicant.value = emptyData;
                    showStatus('All fencer information cleared');
                } catch (error) {
                    console.error('Error clearing fencer data:', error);
                    showStatus('Error clearing fencer information', true);
                }
            }
        });

         
    </script>
</body>
</html>
